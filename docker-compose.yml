services:
  api:
    build: ./api
    container_name: p2a_api
    environment:
      - DATA_DIR=/data
      - MUSIC_LIBRARY_ROOT=/music
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8000
      - CORS_ORIGINS=http://localhost:8546,http://localhost:3000
    volumes:
      - ./data:/data
      - /mnt/yuna/navidrome:/music
    ports:
      - "8545:8000"
    restart: unless-stopped
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--log-level", "info"]

  web:
    build: ./ui
    container_name: p2a_web
    environment:
      - NEXT_PUBLIC_APP_NAME=Playlist2Album
      - API_BASE_INTERNAL=http://api:8000
      - NEXT_PUBLIC_API_BASE_EXTERNAL=http://localhost:8545
    ports:
      - "8546:3000"
    depends_on:
      - api
    restart: unless-stopped

